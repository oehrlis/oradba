name: Docker Integration Tests

on:
  # Run only after the Release workflow completes successfully.
  # This prevents expensive Docker runs on failed tag attempts
  # (e.g. VERSION mismatch, missing release notes) and avoids
  # duplicate runs when a tag is deleted and re-pushed.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  docker-integration:
    name: Oracle 26ai Docker Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run when the triggering Release workflow succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # workflow_run does not set ref to the tag automatically;
          # check out the exact commit that the Release workflow ran on
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build distribution
        run: |
          echo "::group::Building OraDBA distribution"
          ./scripts/build_installer.sh
          ls -lh dist/
          echo "::endgroup::"

      - name: Pull Oracle 26ai Free Docker image
        run: |
          echo "::group::Pulling Oracle 26ai Free image"
          docker pull container-registry.oracle.com/database/free:latest
          echo "::endgroup::"

      - name: Run Docker integration tests
        run: |
          bash tests/run_docker_tests.sh --no-build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-results-${{ github.ref_name }}
          path: tests/results/
          retention-days: 30
          if-no-files-found: warn
