name: Docker Integration Tests

on:
  push:
    tags:
      - 'v*'      # final releases: v1.0.0, v1.2.3
      - '*-rc.*'  # release candidates: 1.0.0-rc.1, 1.0.0-rc.2
  workflow_dispatch:

jobs:
  docker-integration:
    name: Oracle 26ai Docker Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build distribution
        run: |
          echo "::group::Building OraDBA distribution"
          ./scripts/build_installer.sh
          ls -lh dist/
          echo "::endgroup::"

      - name: Pull Oracle 26ai Free Docker image
        run: |
          echo "::group::Pulling Oracle 26ai Free image"
          docker pull container-registry.oracle.com/database/free:latest
          echo "::endgroup::"

      - name: Run Docker integration tests
        run: |
          bash tests/run_docker_tests.sh --no-build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-results-${{ github.ref_name }}
          path: tests/results/
          retention-days: 30
          if-no-files-found: warn
