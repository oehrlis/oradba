name: Dependency Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Report vulnerabilities but do not fail — this is a bash project
          # with no package manager manifests; the action may find nothing.
          fail-on-severity: critical
          comment-summary-in-pr: always
