site_name: OraDBA Documentation
site_url: https://code.oradba.ch/oradba
site_description: Oracle Database Administration Toolset - Complete user guides and reference materials
site_author: Stefan Oehrli
copyright: Copyright &copy; 2026 Stefan Oehrli

# Repository
repo_url: https://github.com/oehrlis/oradba
repo_name: oehrlis/oradba
edit_uri: edit/main/src/doc/

# Documentation directory
docs_dir: src/doc
site_dir: site

# Theme configuration
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light mode
  
  font:
    text: Roboto
    code: Roboto Mono
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: On this page

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Navigation structure
nav:
  - Home: index.md

  - Getting Started:
    - Introduction: introduction.md
    - Installation: installation.md
    - Quick Start: quickstart.md

  - Configuration:
    - Configuration System: configuration.md
    - Advanced Configuration: advanced-configuration.md
    - Environment Management: environment.md

  - Aliases & Tools:
    - Aliases Reference: aliases.md
    - SQL Scripts: sql-scripts.md
    - RMAN Scripts: rman-scripts.md
    - Database Functions: functions.md

  - Operations:
    - Service and Log Operations: operations.md
    - SQL*Net Configuration: sqlnet-config.md
    - Troubleshooting: troubleshooting.md

  - Extensions:
    - Extension System: extensions.md

  - Developer Reference:
    - API Reference:
      - Overview: api/index.md
      - Core Utilities: api/common.md
      - Registry API: api/registry.md
      - Plugin Interface: api/plugins.md
      - Environment Management: api/environment.md
      - Database Operations: api/database.md
      - Alias Management: api/aliases.md
      - Extension System: api/extensions.md
      - Scripts & Commands: api/scripts.md
      - Function Index: api/function-index.md

extra_css:
  - stylesheets/extra.css

# Extra configuration
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oehrlis/oradba
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/oehrlis
  generator: false

# Additional CSS
extra_css:
  - stylesheets/extra.css

# Additional JavaScript
extra_javascript:
  - javascripts/extra.js
